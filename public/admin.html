<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>

<body style="background:#0f172a;color:white;font-family:Arial;text-align:center;">

<script>
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "/login.html";
}
</script>

<h1>🔒 Panel Admin</h1>

<button onclick="logout()" style="background:red;color:white;padding:10px;border:none;">
Cerrar sesión
</button>

<hr>

<h2>Agregar Producto</h2>

<input id="nombre" placeholder="Nombre"><br><br>
<input id="precio" placeholder="Precio"><br><br>

<button onclick="agregar()">Agregar</button>

<p id="msg"></p>

<hr>

<h2>📦 Pedidos</h2>
<div id="pedidos"></div>

<script>

// LOGOUT
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/login.html";
}

// AGREGAR PRODUCTO
async function agregar() {
    const name = document.getElementById("nombre").value;
    const price = document.getElementById("precio").value;

    const res = await fetch("/api/products", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": token
        },
        body: JSON.stringify({ name, price })
    });

    const data = await res.json();

    if (res.ok) {
        document.getElementById("msg").textContent = "Producto agregado";

        // limpiar campos
        document.getElementById("nombre").value = "";
        document.getElementById("precio").value = "";
    } else {
        document.getElementById("msg").textContent = data.error;
    }
}

// CARGAR PEDIDOS
async function cargar() {
    const res = await fetch("/api/pedidos", {
        headers: {
            "Authorization": token
        }
    });

    const data = await res.json();

    const div = document.getElementById("pedidos");

    if (!res.ok) {
        div.innerHTML = "No autorizado";
        return;
    }

    div.innerHTML = "";

    data.forEach(p => {
        let productos = "";

        p.carrito.forEach(item => {
            productos += `<p>🛒 ${item.nombre} - $${item.precio}</p>`;
        });

        div.innerHTML += `
            <div style="background:#1e293b;border-radius:10px;margin:15px;padding:15px;">
                <p><b>ID:</b> ${p._id}</p>
                ${productos}
                <p><b>Total:</b> $${p.total}</p>
                <p>${new Date(p.fecha).toLocaleString()}</p>
            </div>
        `;
    });
}

cargar();

</script>

</body>
</html>
