<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
    font-family:Arial;
    background:#020617;
    color:white;
    text-align:center;
}

input, textarea {
    padding:10px;
    margin:5px;
    width:250px;
}

button {
    padding:10px;
    margin:5px;
    background:#e11d48;
    color:white;
    border:none;
    cursor:pointer;
}

.tab {
    margin:10px;
    cursor:pointer;
    display:inline-block;
    padding:10px;
    background:#111;
}

.active {
    background:#e11d48;
}
</style>
</head>

<body>

<h2>Panel Admin</h2>

<div>
    <span class="tab active" onclick="mostrar('productos')">Productos</span>
    <span class="tab" onclick="mostrar('pedidos')">Pedidos</span>
</div>

<!-- PRODUCTOS -->
<div id="productos">

    <h3>Agregar producto</h3>

    <input id="name" placeholder="Nombre"><br>
    <input id="price" placeholder="Precio"><br>
    <input id="image" placeholder="URL Imagen"><br>
    <textarea id="desc" placeholder="Descripción"></textarea><br>

    <button onclick="agregar()">Guardar</button>

    <h3>Lista</h3>
    <div id="lista"></div>

</div>

<!-- PEDIDOS -->
<div id="pedidos" style="display:none">
    <h3>Pedidos</h3>
    <div id="listaPedidos"></div>
</div>

<script>

// tabs
function mostrar(tipo){
    document.getElementById("productos").style.display = tipo==="productos"?"block":"none";
    document.getElementById("pedidos").style.display = tipo==="pedidos"?"block":"none";
}

// agregar producto
async function agregar(){
    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;
    const image = document.getElementById("image").value;
    const description = document.getElementById("desc").value;

    await fetch("/api/products", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({name, price, image, description})
    });

    cargar();
}

// cargar productos
async function cargar(){
    const res = await fetch("/api/products");
    const data = await res.json();

    const div = document.getElementById("lista");
    div.innerHTML = "";

    data.forEach(p=>{
        div.innerHTML += `
        <div>
            <img src="${p.image}" width="80"><br>
            ${p.name} - $${p.price}<br>
            ${p.description}
            <hr>
        </div>`;
    });
}

// cargar pedidos
async function cargarPedidos(){
    const res = await fetch("/api/pedidos");
    const data = await res.json();

    const div = document.getElementById("listaPedidos");
    div.innerHTML = "";

    data.forEach(p=>{
        div.innerHTML += `
        <div>
            Pedido #${p.id}<br>
            Total: $${p.total}<br>
            ${p.items.map(i=>i.nombre).join(", ")}
            <hr>
        </div>`;
    });
}

// auto cargar
cargar();
cargarPedidos();

</script>

</body>
</html>
