<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panel Admin</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
}

/* HEADER */
header {
    background:#000;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.logout {
    background:red;
    color:white;
}

/* CONTENEDOR */
.container {
    padding:20px;
}

/* FORM */
input {
    padding:8px;
    margin:5px;
    border:none;
    border-radius:5px;
}

.add-btn {
    background:#22c55e;
    color:white;
}

/* PEDIDOS */
.pedido {
    background:#1e293b;
    margin:15px 0;
    padding:15px;
    border-radius:10px;
}
</style>

</head>

<body>

<header>
    <h2>🔐 Panel Admin</h2>
    <button class="logout" onclick="logout()">Cerrar sesión</button>
</header>

<div class="container">

<h3>Agregar Producto</h3>

<input type="text" id="nombre" placeholder="Nombre">
<input type="number" id="precio" placeholder="Precio">
<button class="add-btn" onclick="agregarProducto()">Agregar</button>

<p id="mensaje"></p>

<hr>

<h3>Pedidos</h3>

<div id="pedidos"></div>

</div>

<script>

// 🔐 VERIFICAR LOGIN
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "/login.html";
}

// 🔒 LOGOUT
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/login.html";
}

// ➕ AGREGAR PRODUCTO
async function agregarProducto() {
    const name = document.getElementById("nombre").value;
    const price = document.getElementById("precio").value;

    const res = await fetch("/api/products", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": token
        },
        body: JSON.stringify({ name, price })
    });

    const data = await res.json();

    document.getElementById("mensaje").textContent = "Producto agregado";
}

// 📦 CARGAR PEDIDOS
async function cargarPedidos() {
    const res = await fetch("/api/pedidos", {
        headers: {
            "Authorization": token
        }
    });

    const data = await res.json();

    const div = document.getElementById("pedidos");
    div.innerHTML = "";

    data.forEach(p => {
        div.innerHTML += `
        <div class="pedido">
            <p><b>ID:</b> ${p._id}</p>
            <p><b>Total:</b> $${p.total}</p>
        </div>
        `;
    });
}

cargarPedidos();

</script>

</body>
</html>
