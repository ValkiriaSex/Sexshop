<!DOCTYPE html>
<html>
<body>

<h2>Panel Admin</h2>

<input id="name" placeholder="Nombre"><br>
<input id="price" placeholder="Precio"><br>
<input id="category" placeholder="Categoría"><br>
<textarea id="desc" placeholder="Descripción"></textarea><br>

<input type="file" id="images" multiple><br>

<button onclick="guardar()">Guardar</button>

<script>
// PROTEGER
const admin = JSON.parse(localStorage.getItem("admin"));
if(!admin){
  location.href="/admin-login.html";
}

// GUARDAR PRODUCTO
async function guardar(){
  const f = new FormData();

  f.append("name", name.value);
  f.append("price", price.value);
  f.append("category", category.value);
  f.append("description", desc.value);

  for(let file of images.files){
    f.append("images", file);
  }

  await fetch("/api/products",{
    method:"POST",
    headers:{
      email: admin.email,
      password: admin.password
    },
    body: f
  });

  alert("Producto guardado");
}
</script>

</body>
</html>
