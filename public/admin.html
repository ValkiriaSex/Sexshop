<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
    font-family:Arial;
    background:#020617;
    color:white;
    text-align:center;
}

input, textarea {
    padding:10px;
    margin:5px;
    width:250px;
}

button {
    padding:10px;
    margin:5px;
    background:#e11d48;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>Panel Admin</h2>

<h3>Agregar producto</h3>

<input id="name" placeholder="Nombre"><br>
<input id="price" placeholder="Precio"><br>
<textarea id="desc" placeholder="Descripción"></textarea><br>

<!-- 🔥 CAMBIO IMPORTANTE -->
<input type="file" id="image"><br>

<button onclick="agregar()">Guardar</button>

<h3>Productos</h3>
<div id="lista"></div>

<script>

// 🔥 AGREGAR PRODUCTO (CORRECTO)
async function agregar(){

    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;
    const description = document.getElementById("desc").value;
    const file = document.getElementById("image").files[0];

    if(!file){
        alert("Selecciona una imagen");
        return;
    }

    const formData = new FormData();
    formData.append("name", name);
    formData.append("price", price);
    formData.append("description", description);
    formData.append("image", file);

    const res = await fetch("/api/products", {
        method:"POST",
        body: formData
    });

    const data = await res.json();

    if(data.ok){
        alert("Producto agregado");
        cargar();
    }else{
        alert("Error al guardar");
    }
}

// 🔥 CARGAR PRODUCTOS
async function cargar(){
    const res = await fetch("/api/products");
    const data = await res.json();

    const div = document.getElementById("lista");
    div.innerHTML = "";

    data.forEach(p=>{
        div.innerHTML += `
        <div>
            <img src="${p.image}" width="80"><br>
            ${p.name} - $${p.price}<br>
            ${p.description}
            <hr>
        </div>`;
    });
}

cargar();

</script>

</body>
</html>
