<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
    font-family:Arial;
    background:#020617;
    color:white;
    text-align:center;
}

input, textarea {
    padding:10px;
    margin:5px;
    width:260px;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    cursor:pointer;
    color:white;
}

.guardar { background:#e11d48; }
.eliminar { background:red; }
.editar { background:#2563eb; }
</style>
</head>

<body>

<h2>Panel Admin</h2>

<h3>Agregar producto</h3>

<input id="name" placeholder="Nombre"><br>
<input id="price" placeholder="Precio"><br>
<input id="category" placeholder="Categoría"><br>

<textarea id="desc" placeholder="Descripción"></textarea><br>

<input type="file" id="image"><br>

<button class="guardar" onclick="guardar()">Guardar</button>

<h3>Productos</h3>
<div id="lista"></div>

<script>

let productos = [];
let editandoId = null;

// ================= GUARDAR =================
async function guardar(){

    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;
    const category = document.getElementById("category").value;
    const description = document.getElementById("desc").value;
    const file = document.getElementById("image").files[0];

    const formData = new FormData();
    formData.append("name", name);
    formData.append("price", price);
    formData.append("category", category);
    formData.append("description", description);

    if(file){
        formData.append("image", file);
    }

    if(editandoId){
        await fetch("/api/products/" + editandoId, {
            method:"PUT",
            body: formData
        });
        editandoId = null;
    } else {
        await fetch("/api/products", {
            method:"POST",
            body: formData
        });
    }

    limpiar();
    cargar();
}

// ================= CARGAR =================
async function cargar(){

    const res = await fetch("/api/products");
    productos = await res.json();

    const div = document.getElementById("lista");
    div.innerHTML = "";

    productos.forEach(p=>{
        div.innerHTML += `
        <div style="border-bottom:1px solid #444; margin:10px;">
            <img src="${p.image}" width="80"><br>
            ${p.name} - $${p.price}<br>
            Categoría: ${p.category || "General"}<br>

            <button class="editar" onclick="editar(${p.id})">Editar</button>
            <button class="eliminar" onclick="eliminar(${p.id})">Eliminar</button>
        </div>
        `;
    });
}

// ================= EDITAR =================
function editar(id){

    const p = productos.find(x => x.id === id);
    if(!p) return;

    document.getElementById("name").value = p.name;
    document.getElementById("price").value = p.price;
    document.getElementById("category").value = p.category || "";
    document.getElementById("desc").value = p.description;

    editandoId = p.id;
}

// ================= ELIMINAR =================
async function eliminar(id){

    if(!confirm("Eliminar producto?")) return;

    await fetch("/api/products/" + id, {
        method:"DELETE"
    });

    cargar();
}

// ================= LIMPIAR =================
function limpiar(){
    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("category").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("image").value = "";
}

// ================= INICIO =================
cargar();

</script>

</body>
</html>
