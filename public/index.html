<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Sex Shop</title>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    margin:0;
}

h1 {
    text-align:center;
    padding:20px;
}

#productos {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:#1e293b;
    border-radius:15px;
    padding:15px;
    text-align:center;
}

.card img {
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}

button {
    background:#22c55e;
    border:none;
    padding:10px;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover {
    background:#16a34a;
}

#carrito {
    position:fixed;
    top:10px;
    right:10px;
    background:#22c55e;
    padding:10px;
    border-radius:10px;
}
</style>

</head>

<body>

<h1>🔥 Sex Shop 🔥</h1>

<div id="carrito">
🛒 <span id="total">0</span>
</div>

<div id="productos"></div>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function actualizarCarrito() {
    document.getElementById("total").textContent = carrito.length;
}

async function cargarProductos() {
    const res = await fetch("/api/products");
    const data = await res.json();

    const div = document.getElementById("productos");

    div.innerHTML = "";

    data.forEach(p => {
        div.innerHTML += `
        <div class="card">
            <img src="https://via.placeholder.com/300x200" />
            <h3>${p.name}</h3>
            <p>$${p.price}</p>
            <button onclick="comprar('${p.name}', ${p.price})">
                Comprar
            </button>
        </div>
        `;
    });
}

function comprar(nombre, precio) {
    carrito.push({ nombre, precio });

    localStorage.setItem("carrito", JSON.stringify(carrito));

    actualizarCarrito();
}

cargarProductos();
actualizarCarrito();

</script>

</body>
</html>
