<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Sex Shop</title>

<style>
* { box-sizing: border-box; }

body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* HEADER */
header {
    background:#020617;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #1e293b;
}

.logo {
    font-size:22px;
    font-weight:bold;
}

.cart-btn {
    background:#e11d48;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
}

/* GRID */
#productos {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:30px;
}

/* CARD */
.card {
    background:#020617;
    border-radius:15px;
    overflow:hidden;
    border:1px solid #1e293b;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.03);
}

.card img {
    width:100%;
    height:230px;
    object-fit:cover;
}

.card-content {
    padding:15px;
}

.price {
    color:#22c55e;
    margin:10px 0;
}

button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#e11d48;
    color:white;
    cursor:pointer;
}

/* CARRITO */
#panelCarrito {
    position:fixed;
    right:-350px;
    top:0;
    width:350px;
    height:100%;
    background:#020617;
    border-left:1px solid #1e293b;
    transition:0.3s;
    padding:20px;
}

#panelCarrito.open {
    right:0;
}

.item {
    border-bottom:1px solid #1e293b;
    padding:10px 0;
}

.total {
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <div class="logo">
    <img src="logo.png">
</div>
    <div class="cart-btn" onclick="toggleCarrito()">
        🛒 <span id="total">0</span>
    </div>
</header>

<div id="productos"></div>

<div id="panelCarrito">
    <h3>Carrito</h3>
    <div id="items"></div>
    <div class="total">Total: $<span id="totalPrecio">0</span></div>
</div>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardar() {
    localStorage.setItem("carrito", JSON.stringify(carrito));
}

function actualizarCarrito() {
    document.getElementById("total").textContent = carrito.length;

    const items = document.getElementById("items");
    items.innerHTML = "";

    let total = 0;

    carrito.forEach(p => {
        total += p.precio;
        items.innerHTML += `<div class="item">${p.nombre} - $${p.precio}</div>`;
    });

    document.getElementById("totalPrecio").textContent = total;
}

function toggleCarrito() {
    document.getElementById("panelCarrito").classList.toggle("open");
}

function comprar(nombre, precio) {
    carrito.push({ nombre, precio });
    guardar();
    actualizarCarrito();
}

async function cargarProductos() {
    const res = await fetch("/api/products");
    const data = await res.json();

    const div = document.getElementById("productos");
    div.innerHTML = "";

    data.forEach(p => {
        div.innerHTML += `
        <div class="card">
            <img src="https://via.placeholder.com/300x230">
            <div class="card-content">
                <h3>${p.name}</h3>
                <div class="price">$${p.price}</div>
                <button onclick="comprar('${p.name}', ${p.price})">
                    Comprar
                </button>
            </div>
        </div>
        `;
    });
}

cargarProductos();
actualizarCarrito();

</script>

</body>
</html>
