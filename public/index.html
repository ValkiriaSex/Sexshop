<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Valkiria Sex Shop</title>

<style>
body { margin:0; font-family:Arial; background:white; }

header {
    background:#020617;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo img {
    height:50px;
    animation:pulse 2s infinite;
}

@keyframes pulse {
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

.btn { padding:8px 12px; border-radius:20px; cursor:pointer; }
.login-btn { background:white; }
.cart-btn { background:#e11d48; color:white; }

.banner {
    background:#e11d48;
    color:white;
    text-align:center;
    padding:6px;
}

#productos {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    border:1px solid #eee;
    border-radius:10px;
}

.card img { width:100%; }

.card-content { padding:10px; }

button {
    background:#e11d48;
    color:white;
    border:none;
    padding:10px;
    width:100%;
}

#carritoPanel {
    position:fixed;
    right:-300px;
    top:0;
    width:300px;
    height:100%;
    background:white;
    border-left:2px solid #e11d48;
    padding:15px;
    transition:0.3s;
}

#carritoPanel.open { right:0; }

.whatsapp {
    position:fixed;
    bottom:20px;
    right:20px;
    width:65px;
    height:65px;
    background:#25D366;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    animation:bounce 2s infinite;
}

.whatsapp img { width:35px; }

@keyframes bounce {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="/logo.png">
    </div>

    <div>
        <span class="btn login-btn" onclick="location.href='/login.html'">Login</span>
        <span class="btn cart-btn" onclick="toggleCarrito()">🛒 <span id="count">0</span></span>
    </div>
</header>

<div class="banner">Compra segura - Envíos discretos</div>

<div id="productos"></div>

<div id="carritoPanel">
    <h3>Carrito</h3>
    <div id="lista"></div>
    <h4>Total: $<span id="total">0</span></h4>
    <button onclick="enviarPedido()">Comprar por WhatsApp</button>
</div>

<a class="whatsapp" href="https://wa.me/573114676645" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardar(){
    localStorage.setItem("carrito", JSON.stringify(carrito));
}

function agregar(nombre, precio){
    carrito.push({nombre, precio});
    guardar();
    renderCarrito();
}

function renderCarrito(){
    let total = 0;
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    carrito.forEach(p=>{
        total += Number(p.precio);
        lista.innerHTML += `<p>${p.nombre} - $${p.precio}</p>`;
    });

    document.getElementById("total").textContent = total;
    document.getElementById("count").textContent = carrito.length;
}

function toggleCarrito(){
    document.getElementById("carritoPanel").classList.toggle("open");
}

function enviarPedido(){
    let mensaje = "Hola, quiero comprar:\n";

    carrito.forEach(p=>{
        mensaje += `- ${p.nombre} ($${p.precio})\n`;
    });

    mensaje += `Total: $${document.getElementById("total").textContent}`;

    window.open(`https://wa.me/573114676645?text=${encodeURIComponent(mensaje)}`);
}

async function cargarProductos(){
    const res = await fetch("/api/products");
    const data = await res.json();

    const div = document.getElementById("productos");

    data.forEach(p=>{
        div.innerHTML += `
        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>${p.name}</h3>
                <p>$${p.price}</p>
                <button onclick="agregar('${p.name}', ${p.price})">
                    Agregar al carrito
                </button>
            </div>
        </div>`;
    });

    renderCarrito();
}

cargarProductos();
</script>

</body>
</html>
