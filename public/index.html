<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Valkiria</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header{background:#020617;color:#fff;padding:15px;display:flex;justify-content:space-between}
input.search{padding:8px;width:200px}

/* BANNER */
.banner img{width:100%;height:200px;object-fit:cover}

/* CATEGORIAS */
.categorias{display:flex;gap:10px;padding:10px;background:#fff;overflow-x:auto}
.categorias button{padding:8px;border:none;border-radius:20px;background:#ddd}

/* PRODUCTOS */
#productos{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:15px}
.card{background:#fff;border-radius:10px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:200px;object-fit:cover}

/* REDES */
.redes{position:fixed;bottom:20px;left:20px}
.redes a{display:block;margin:5px;font-size:24px}
</style>
</head>

<body>

<header>
    <h2>Valkiria</h2>
    <input class="search" placeholder="Buscar..." onkeyup="buscar(this.value)">
</header>

<!-- BANNER (FLYER) -->
<div class="banner">
    <img id="bannerImg" src="https://via.placeholder.com/1200x200">
</div>

<!-- CATEGORIAS -->
<div id="categorias" class="categorias"></div>

<!-- PRODUCTOS -->
<div id="productos"></div>

<!-- REDES -->
<div class="redes">
    <a href="https://instagram.com" target="_blank">📸</a>
    <a href="https://tiktok.com" target="_blank">🎵</a>
</div>

<script>

let productos = [];
let filtrados = [];

// CARGAR
async function cargar(){
    const res = await fetch("/api/products");
    productos = await res.json();

    filtrados = productos;

    categorias();
    mostrar();
}

// CATEGORIAS
function categorias(){
    const cats = ["Todos", ...new Set(productos.map(p=>p.category||"General"))];
    categorias.innerHTML="";

    cats.forEach(c=>{
        categorias.innerHTML += `<button onclick="filtrar('${c}')">${c}</button>`;
    });
}

// FILTRAR
function filtrar(cat){
    if(cat==="Todos"){
        filtrados = productos;
    }else{
        filtrados = productos.filter(p=>p.category===cat);
    }
    mostrar();
}

// BUSCAR
function buscar(txt){
    filtrados = productos.filter(p=>p.name.toLowerCase().includes(txt.toLowerCase()));
    mostrar();
}

// MOSTRAR
function mostrar(){
    productosDiv = document.getElementById("productos");
    productosDiv.innerHTML="";

    filtrados.forEach(p=>{
        productosDiv.innerHTML+=`
        <div class="card">
            <img src="${p.image}">
            <div style="padding:10px">
                <b>${p.name}</b><br>
                $${p.price}
            </div>
        </div>`;
    });
}

cargar();

</script>

</body>
</html>
