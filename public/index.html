<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sex Shop</title>

<style>

body {
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
    color:#111;
}

/* HEADER */
header {
    background:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo {
    font-size:20px;
    font-weight:bold;
}

#carrito {
    background:black;
    color:white;
    padding:8px 12px;
    border-radius:20px;
}

/* GRID PRODUCTOS */
#productos {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:30px;
}

/* CARD */
.card {
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
}

.card img {
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content {
    padding:15px;
}

.card h3 {
    margin:0;
}

.price {
    font-size:18px;
    font-weight:bold;
    margin:10px 0;
}

/* BOTON */
button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:black;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#333;
}

</style>

</head>

<body>

<header>
    <div class="logo">🔥 Sex Shop</div>
    <div id="carrito">🛒 <span id="total">0</span></div>
</header>

<div id="productos"></div>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function actualizarCarrito() {
    document.getElementById("total").textContent = carrito.length;
}

async function cargarProductos() {
    const res = await fetch("/api/products");
    const data = await res.json();

    const div = document.getElementById("productos");
    div.innerHTML = "";

    data.forEach(p => {
        div.innerHTML += `
        <div class="card">
            <img src="https://via.placeholder.com/300x250">
            <div class="card-content">
                <h3>${p.name}</h3>
                <div class="price">$${p.price}</div>
                <button onclick="comprar('${p.name}', ${p.price})">
                    Agregar al carrito
                </button>
            </div>
        </div>
        `;
    });
}

function comprar(nombre, precio) {
    carrito.push({ nombre, precio });
    localStorage.setItem("carrito", JSON.stringify(carrito));
    actualizarCarrito();
}

cargarProductos();
actualizarCarrito();

</script>

</body>
</html>
