<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Valkiria Sex Shop</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:white;
}

/* HEADER */
header {
    background:#020617;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* LOGO ANIMADO */
.logo img {
    height:50px;
    animation: pulse 2s infinite;
}

/* ANIMACION LOGO */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

.btn {
    padding:8px 12px;
    border-radius:20px;
    cursor:pointer;
}

.login-btn {
    background:white;
}

.cart-btn {
    background:#e11d48;
    color:white;
}

/* BANNER */
.banner {
    background:#e11d48;
    color:white;
    text-align:center;
    padding:6px;
    font-size:14px;
}

/* PRODUCTOS */
#productos {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    border:1px solid #eee;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
}

.card img {
    width:100%;
}

.card-content {
    padding:10px;
}

button {
    background:#e11d48;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    cursor:pointer;
}

/* WHATSAPP PRO ANIMADO */
.whatsapp {
    position:fixed;
    bottom:20px;
    right:20px;
    width:65px;
    height:65px;
    background:#25D366;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    animation: bounce 2s infinite;
    z-index:999;
}

.whatsapp img {
    width:35px;
    height:35px;
}

/* ANIMACION WHATSAPP */
@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="/logo.png">
    </div>

    <div>
        <span class="btn login-btn" onclick="location.href='/login.html'">Login</span>
        <span class="btn cart-btn">🛒 <span id="total">0</span></span>
    </div>
</header>

<div class="banner">
Compra segura - Envíos discretos
</div>

<div id="productos"></div>

<!-- BOTON WHATSAPP -->
<a class="whatsapp" href="https://wa.me/573114676645" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>
async function cargarProductos(){
    const res = await fetch("/api/products");
    const data = await res.json();

    const div = document.getElementById("productos");

    data.forEach(p => {
        div.innerHTML += `
        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>${p.name}</h3>
                <p>$${p.price}</p>
                <button>Comprar</button>
            </div>
        </div>`;
    });
}

cargarProductos();
</script>

</body>
</html>
