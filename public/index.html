<!-- CAMBIO FORZADO -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Valkiria</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:white}

/* HEADER */
header{
  background:#020617;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
}

.logo img{
  height:50px;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  50%{transform:scale(1.1);}
}

.btn{
  background:#e11d48;
  border:none;
  color:white;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

/* BANNER */
.banner{
  background:#e11d48;
  text-align:center;
  padding:6px;
}

/* BUSCAR */
.search{
  width:90%;
  margin:10px auto;
  display:block;
  padding:10px;
}

/* GRID */
#productos{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:white;
  color:black;
  border-radius:10px;
  cursor:pointer;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0007;
}

.modal{
  background:white;
  max-width:400px;
  margin:80px auto;
  padding:20px;
  border-radius:10px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  width:65px;
  height:65px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.whatsapp img{width:35px}

/* REDES */
.redes{
  position:fixed;
  bottom:20px;
  left:20px;
}

.redes img{
  width:40px;
  margin:5px;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="/logo.png">
  </div>

  <div>
    <button class="btn" onclick="location.href='/login.html'">Login</button>
    <button class="btn" onclick="location.href='/register.html'">Registro</button>
    <button class="btn" onclick="toggleCart()">🛒 <span id="count">0</span></button>
  </div>
</header>

<div class="banner">Compra segura - Envíos discretos</div>

<input class="search" placeholder="Buscar..." onkeyup="buscar(this.value)">

<div id="productos"></div>

<!-- MODAL -->
<div id="modal">
  <div class="modal">
    <div id="imgs"></div>
    <h3 id="name"></h3>
    <p id="price"></p>
    Cantidad:
    <input id="qty" type="number" value="1">
    <button onclick="addCart()">Agregar</button>
    <button onclick="closeModal()">Cerrar</button>
  </div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/573114676645" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<!-- REDES -->
<div class="redes">
  <a href="https://www.instagram.com/sex_shopvalkiria/" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
  </a>
  <a href="https://www.tiktok.com/@sex_shopvalkiria" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
  </a>
</div>

<script>
let productos=[],filtrados=[],cart=[],actual=null;

async function cargar(){
  const res=await fetch("/api/products");
  productos=await res.json();
  filtrados=productos;
  render();
}

function render(){
  productosDiv.innerHTML="";
  filtrados.forEach(p=>{
    productosDiv.innerHTML+=`
    <div class="card" onclick='ver(${JSON.stringify(p)})'>
      <img src="${p.images?.[0]||''}">
      <div style="padding:10px">
        <b>${p.name}</b><br>$${p.price}
      </div>
    </div>`;
  });
}

function buscar(txt){
  txt=txt.toLowerCase();
  filtrados=productos.filter(p=>p.name.toLowerCase().includes(txt));
  render();
}

function ver(p){
  actual=p;
  modal.style.display="block";
  name.textContent=p.name;
  price.textContent="$"+p.price;
  imgs.innerHTML="";
  (p.images||[]).forEach(i=>imgs.innerHTML+=`<img src="${i}" style="width:100%">`);
}

function closeModal(){
  modal.style.display="none";
}

function addCart(){
  const q=Number(qty.value)||1;
  for(let i=0;i<q;i++) cart.push(actual);
  count.textContent=cart.length;
  closeModal();
}

function toggleCart(){
  alert("Productos en carrito: "+cart.length);
}

const productosDiv=document.getElementById("productos");
const modal=document.getElementById("modal");
const name=document.getElementById("name");
const price=document.getElementById("price");
const imgs=document.getElementById("imgs");
const qty=document.getElementById("qty");
const count=document.getElementById("count");

cargar();
</script>

</body>
</html>
