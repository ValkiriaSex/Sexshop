<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#020617;
    color:white;
    text-align:center;
}

.container { margin-top:80px; }

.logo img {
    height:60px;
    margin-bottom:20px;
}

input {
    padding:12px;
    width:250px;
    margin:10px;
    border-radius:8px;
    border:none;
}

button {
    padding:12px;
    width:270px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#e11d48;
    color:white;
    cursor:pointer;
}

.link {
    display:block;
    margin-top:10px;
    color:#e11d48;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
    <img src="/logo.png">
</div>

<h2>Iniciar sesión</h2>

<input id="email" placeholder="Correo"><br>
<input id="password" type="password" placeholder="Contraseña"><br>

<button onclick="login()">Entrar</button>

<span class="link" onclick="location.href='/register.html'">
Crear cuenta
</span>

</div>

<script>
async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/api/login", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({email, password})
    });

    const data = await res.json();

    if(data.token){
        alert("Bienvenido");
        window.location.href = "/";
    } else {
        alert("Datos incorrectos");
    }
}
</script>

</body>
</html>
