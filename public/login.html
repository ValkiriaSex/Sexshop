<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#020617;
    color:white;
    text-align:center;
}

.container {
    margin-top:80px;
}

.logo img {
    height:60px;
    margin-bottom:20px;
}

input {
    padding:12px;
    width:250px;
    margin:10px;
    border-radius:8px;
    border:none;
}

button {
    padding:12px;
    width:270px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#e11d48;
    color:white;
    cursor:pointer;
}

.social {
    background:white;
    color:black;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
    <img src="/logo.png">
</div>

<h2>Iniciar sesión</h2>

<input placeholder="Correo"><br>
<input type="password" placeholder="Contraseña"><br>

<button>Entrar</button>

<h3>o continuar con</h3>

<button class="social">Google</button>
<button class="social">iCloud</button>

</div>

</body>
</html>
