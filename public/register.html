<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registro</title>

<style>
body{
    background:#020617;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:80px;
}

input{
    padding:12px;
    margin:10px;
    width:260px;
    border-radius:8px;
    border:none;
}

button{
    padding:12px;
    width:280px;
    background:#e11d48;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>PRUEBA REAL</h1>

<input id="email" placeholder="Correo"><br>
<input id="password" type="password" placeholder="Contraseña"><br>

<button id="btn">Crear cuenta</button>

<p id="msg"></p>

<script>
document.getElementById("btn").addEventListener("click", async () => {

    console.log("CLICK detectado");

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    if(!email || !password){
        msg.innerText = "Completa los campos";
        return;
    }

    try{
        const res = await fetch("/api/register",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        console.log(data);

        if(data.ok){
            msg.innerText = "Cuenta creada";
        }else{
            msg.innerText = "Usuario ya existe";
        }

    }catch(e){
        console.log(e);
        msg.innerText = "Error conexión";
    }

});
</script>

</body>
</html>
