<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crear cuenta</title>

<style>
body{
    background:#020617;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:80px;
}

input{
    padding:12px;
    margin:10px;
    width:260px;
    border-radius:8px;
    border:none;
}

button{
    padding:12px;
    width:280px;
    background:#e11d48;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.msg{ margin-top:10px; }
.error{ color:red; }
.ok{ color:lime; }
</style>
</head>

<body>

<h1>PRUEBA REAL</h1>
<h2>Crear cuenta</h2>

<input id="email" placeholder="Correo"><br>
<input id="password" type="password" placeholder="Contraseña"><br>

<button onclick="register()">Crear cuenta</button>

<div id="msg" class="msg"></div>

<br>
<a href="/login.html" style="color:#e11d48">Ya tengo cuenta</a>

<script>
async function register(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    console.log("CLICK detectado");

    if(!email || !password){
        msg.innerHTML = "<span class='error'>Completa los campos</span>";
        return;
    }

    try{

        const res = await fetch("/api/register",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const data = await res.json();

        console.log("RESPUESTA:", data);

        if(data.ok){
            msg.innerHTML = "<span class='ok'>Cuenta creada</span>";
        }else{
            msg.innerHTML = "<span class='error'>Usuario ya existe</span>";
        }

    }catch(error){
        console.log("ERROR:", error);
        msg.innerHTML = "<span class='error'>Error de conexión</span>";
    }
}
</script>

</body>
</html>
